services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: blog
      MYSQL_USER: blog_app
      MYSQL_PASSWORD: blog_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      MYSQL_PASSWORD: blog_password
      JWT_SECRET: dev-jwt-secret-key-must-be-at-least-32-chars-long
      SEED_DATA: "true"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
